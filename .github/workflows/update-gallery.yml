
name: Update Gallery

on:
  push:
    paths:
      - 'assets/photos/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate gallery.json
        run: |
          echo '{ "images": [' > assets/data/gallery.json
          first=1
          for file in assets/photos/*; do
            if [[ -f "$file" ]]; then
              if [ $first -eq 0 ]; then echo ',' >> assets/data/gallery.json; fi
              first=0
              echo -n '"'$file'"' >> assets/data/gallery.json
            fi
          done
          echo '] }' >> assets/data/gallery.json
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/data/gallery.json
          git commit -m "Update gallery"
          git push || echo "No changes"
