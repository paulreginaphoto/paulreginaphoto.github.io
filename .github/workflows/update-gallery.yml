name: Update gallery

on:
  push:
    branches:
      - main
    paths:
      - 'assets/photos/**'
      - 'scripts/build_gallery.py'
      - '.github/workflows/update-gallery.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gallery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build gallery data
        run: python scripts/build_gallery.py

      - name: Commit updated gallery data
        run: |
          if git diff --quiet -- assets/data/gallery.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/gallery.json
          git commit -m "Update gallery data"
          git push
