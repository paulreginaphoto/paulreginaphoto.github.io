name: Update gallery manifest

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'assets/photos/**'
      - 'scripts/build-gallery.js'
      - '.github/workflows/update-gallery.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gallery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate gallery manifest
        run: node scripts/build-gallery.js

      - name: Commit updated gallery manifest
        run: |
          if git diff --quiet -- assets/data/gallery.json; then
            echo "No gallery changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/gallery.json
          git commit -m "chore: update gallery manifest"
          git push
